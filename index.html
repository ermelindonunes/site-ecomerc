<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    /*Global */
    :root {
      --primary-color: #1C3657;
      --secondary-color: #FF9121;
    }

    body {
      margin: 0;
      padding: 0;
    }

    /* Header */

    header {
      background-color: var(--primary-color);
      height: 70px;
      width: 100%;
      padding: 0px 35px 0px 35px;
      display: flex;
      position: sticky;
      top: 0;
      flex-direction: row;
      box-sizing: border-box;
      align-items: center;
    }

    #nav-icon-header {
      display: none;
      height: 30px;
      width: auto;
    }

    #logo-header {
      height: 100%;
      width: auto;
    }

    #texto-especialista-header {
      color: white;
      margin: 0px 20px 0px 20px;
      padding: 0px 0px 0px 10px;
      font-size: 14px;
      box-shadow: rgb(179, 179, 179) -1px 0px 0px 0px;
    }

    #whatsapp-link-header {
      color: white;
      text-decoration: none;
    }


    #cart-wrapper-header {
      margin-left: auto;
      display: flex;
      align-items: center;
      height: 100%;
      width: auto;
      position: relative;
    }

    #icon-carrinho-header {
      margin-left: auto;
      height: 40px;
      width: auto;
    }

    #red-counter-header {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: red;
      border-radius: 100%;
      top: 4px;
      left: 30px;
      height: 15px;
      width: 15px;

    }

    #search-wrapper-header {
      display: inline-flex;
      height: 100%;
      position: relative;
      align-items: center;
    }

    .hyperlink-header {
      margin-left: auto;
      color: white;
      text-decoration: none;
      margin-left: 25px;
    }

    #search-wrapper-header form {
      display: inline-flex;
      align-items: center;
      height: 100%;
    }

    #search-wrapper-header form input {
      box-sizing: border-box;
      height: 40px;
      width: 350px;
      border-radius: 5px;
      border: none;
      padding: 0px 10px;
    }

    #search-wrapper-header form button {
      position: absolute;
      left: 100%;
      transform: translateX(-100%);
    }

    #search-wrapper-header form button img {
      height: 20px;
    }

    .btn-search-submit {
      background-color: transparent;
      border: none;
      cursor: pointer;
    }

    nav {

      height: 30px;
      width: 100%;
      background-color: var(--secondary-color);
      display: flex;
      direction: row;
      margin: 0;
      padding: 0;
    }

    ul {
      display: flex;
    }

    #user-wrapper-header {
      margin-left: 20px;
      display: flex;
    }

    #user-wrapper-header a img {
      height: 40px;
      display: flex;
    }
  </style>
</head>



<body>

  <header>

    <img id="nav-icon-header" src="assets/icons/nav-icon.svg" alt="">

    <img src="assets/images/logo-servitec.jpg" alt="Logo da Emprea Servitec" id="logo-header">

    <span id="texto-especialista-header"><a id="whatsapp-link-header" href="https://wa.me/c/5522981021821">Fale com um
        dos nossos especialistas:<br>(22) 98102-1821</a></span>


    <div id="search-wrapper-header">
      <form action="">
        <input type="text" placeholder="Pesquise aqui:" id="">
        <button class="btn-search-submit" type="submit"><img id="search-icon-header" src="assets/icons/search-icon.svg"
            alt=""></button>
      </form>
    </div>

    <a class="hyperlink-header" href="">FAQ</a>
    <a class="hyperlink-header" href="">Contato</a>
    <a class="hyperlink-header" href="">Financiamento</a>
    <a class="hyperlink-header" href="">Blog</a>

    <div id="cart-wrapper-header">


      <img src="assets/icons/cart-shopping-svgrepo-com.svg" alt="" id="icon-carrinho-header">

      <span id="red-counter-header">0</span>

    </div>

    <div id="user-wrapper-header">
      <a href = "login.html">
        <img src="assets/icons/user-icon.svg" alt="" id="">
      </a>
    </div>




  </header>

  <nav>
    <ul>
      <li>teste</li>
      <li>eeeee</li>
      <li>teste</li>
      <li>eeeee</li>
    </ul>

  </nav>

  <div style="height: 5000px;"></div>

</body>

</html>
